<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Clip mask buat area teks biar slide-nya bersih, ga keluar area -->
    <clipPath id="textArea">
      <rect x="0" y="55" width="800" height="60"/>
    </clipPath>
  </defs>

  <!-- LANGIT -->
  <rect width="800" height="130" fill="#1a1448"/>
  <rect width="800" height="20" y="110" fill="#2d2070"/>
  <rect width="800" height="10" y="125" fill="#4a3590"/>

  <!-- BINTANG BERKEDIP -->
  <g fill="#fff8c4">
    <rect x="60" y="20" width="3" height="3"><animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/></rect>
    <rect x="140" y="35" width="2" height="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></rect>
    <rect x="220" y="15" width="3" height="3"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></rect>
    <rect x="310" y="40" width="2" height="2"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/></rect>
    <rect x="400" y="25" width="3" height="3"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></rect>
    <rect x="490" y="50" width="2" height="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/></rect>
    <rect x="580" y="20" width="3" height="3"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="670" y="45" width="2" height="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></rect>
    <rect x="740" y="30" width="3" height="3"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></rect>
  </g>

  <!-- BULAN MERAH -->
  <g opacity="0.4"><rect x="640" y="35" width="60" height="60" fill="#ff4060"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/></rect></g>
  <g fill="#e63946">
    <rect x="660" y="40" width="30" height="6"/><rect x="654" y="46" width="42" height="6"/>
    <rect x="650" y="52" width="50" height="6"/><rect x="648" y="58" width="54" height="12"/>
    <rect x="650" y="70" width="50" height="6"/><rect x="654" y="76" width="42" height="6"/>
    <rect x="660" y="82" width="30" height="6"/>
  </g>
  <rect x="658" y="50" width="6" height="6" fill="#ff6b75"/>
  <rect x="664" y="52" width="4" height="4" fill="#ff8a95"/>

  <!-- AWAN BERGERAK -->
  <g fill="#3d2f7a">
    <g><rect x="0" y="60" width="40" height="4"/><rect x="-10" y="56" width="60" height="4"/><rect x="5" y="52" width="35" height="4"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="850 0" dur="40s" repeatCount="indefinite"/></g>
    <g><rect x="200" y="75" width="50" height="4"/><rect x="195" y="71" width="60" height="4"/><rect x="210" y="67" width="35" height="4"/>
      <animateTransform attributeName="transform" type="translate" from="-100 0" to="900 0" dur="50s" repeatCount="indefinite"/></g>
    <g><rect x="450" y="65" width="55" height="4"/><rect x="445" y="61" width="65" height="4"/><rect x="460" y="57" width="40" height="4"/>
      <animateTransform attributeName="transform" type="translate" from="-200 0" to="800 0" dur="60s" repeatCount="indefinite"/></g>
  </g>

  <!-- GUNUNG -->
  <g fill="#2a1f5c">
    <polygon points="50,135 90,95 130,135"/><polygon points="120,135 160,105 200,135"/>
    <polygon points="500,135 540,100 580,135"/>
  </g>
  <g fill="#3a2b78">
    <rect x="350" y="100" width="100" height="5"/><rect x="340" y="105" width="120" height="5"/>
    <rect x="330" y="110" width="140" height="5"/><rect x="320" y="115" width="160" height="5"/>
    <rect x="310" y="120" width="180" height="5"/><rect x="300" y="125" width="200" height="5"/>
    <rect x="290" y="130" width="220" height="5"/>
  </g>
  <g fill="#f0e8ff">
    <rect x="380" y="80" width="40" height="5"/><rect x="370" y="85" width="60" height="5"/>
    <rect x="365" y="90" width="70" height="5"/><rect x="360" y="95" width="80" height="5"/>
    <rect x="355" y="100" width="10" height="5"/><rect x="370" y="100" width="6" height="10"/>
    <rect x="385" y="100" width="8" height="5"/><rect x="410" y="100" width="8" height="5"/>
    <rect x="425" y="100" width="6" height="10"/><rect x="440" y="100" width="10" height="5"/>
  </g>
  <g fill="#2a1f5c" opacity="0.5">
    <rect x="400" y="105" width="50" height="5"/><rect x="410" y="110" width="50" height="5"/>
    <rect x="420" y="115" width="50" height="5"/><rect x="430" y="120" width="50" height="5"/>
  </g>

  <!-- LAUT -->
  <rect x="0" y="135" width="800" height="65" fill="#0d2a5c"/>
  <g fill="#1e4a8a"><g>
    <rect x="0" y="140" width="800" height="4"/>
    <rect x="20" y="138" width="40" height="2"/><rect x="120" y="138" width="40" height="2"/>
    <rect x="220" y="138" width="40" height="2"/><rect x="320" y="138" width="40" height="2"/>
    <rect x="420" y="138" width="40" height="2"/><rect x="520" y="138" width="40" height="2"/>
    <rect x="620" y="138" width="40" height="2"/><rect x="720" y="138" width="40" height="2"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; -100 0; 0 0" dur="6s" repeatCount="indefinite"/>
  </g></g>
  <g fill="#2e6aa8"><g>
    <rect x="-100" y="155" width="1000" height="6"/>
    <rect x="-60" y="151" width="60" height="4"/><rect x="80" y="151" width="60" height="4"/>
    <rect x="220" y="151" width="60" height="4"/><rect x="360" y="151" width="60" height="4"/>
    <rect x="500" y="151" width="60" height="4"/><rect x="640" y="151" width="60" height="4"/>
    <rect x="780" y="151" width="60" height="4"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 140 0; 0 0" dur="5s" repeatCount="indefinite"/>
  </g></g>
  <g fill="#a8d4f0"><g>
    <rect x="20" y="154" width="3" height="3"/><rect x="160" y="154" width="3" height="3"/>
    <rect x="300" y="154" width="3" height="3"/><rect x="440" y="154" width="3" height="3"/>
    <rect x="580" y="154" width="3" height="3"/><rect x="720" y="154" width="3" height="3"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 140 0; 0 0" dur="5s" repeatCount="indefinite"/>
  </g></g>
  <g fill="#4a8acc"><g>
    <rect x="-50" y="175" width="900" height="8"/>
    <rect x="-20" y="170" width="80" height="5"/><rect x="160" y="170" width="80" height="5"/>
    <rect x="340" y="170" width="80" height="5"/><rect x="520" y="170" width="80" height="5"/>
    <rect x="700" y="170" width="80" height="5"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; -180 0; 0 0" dur="4s" repeatCount="indefinite"/>
  </g></g>
  <g fill="#e8f4ff"><g>
    <rect x="20" y="172" width="4" height="4"/><rect x="200" y="172" width="4" height="4"/>
    <rect x="380" y="172" width="4" height="4"/><rect x="560" y="172" width="4" height="4"/>
    <rect x="740" y="172" width="4" height="4"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; -180 0; 0 0" dur="4s" repeatCount="indefinite"/>
  </g></g>
  <rect x="0" y="183" width="800" height="17" fill="#0a1f47"/>
  <g fill="#1a3a7a">
    <rect x="0" y="183" width="800" height="2"/>
    <rect x="40" y="188" width="20" height="2"/><rect x="140" y="188" width="20" height="2"/>
    <rect x="260" y="188" width="20" height="2"/><rect x="380" y="188" width="20" height="2"/>
    <rect x="500" y="188" width="20" height="2"/><rect x="620" y="188" width="20" height="2"/>
    <rect x="720" y="188" width="20" height="2"/>
  </g>

  <!-- PERAHU -->
  <g><g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0; 0 1; 0 0" dur="3s" repeatCount="indefinite"/>
    <rect x="148" y="118" width="2" height="20" fill="#5c3a1f"/>
    <rect x="138" y="120" width="12" height="2" fill="#f4e4c1"/>
    <rect x="135" y="122" width="15" height="2" fill="#f4e4c1"/>
    <rect x="132" y="124" width="18" height="2" fill="#f4e4c1"/>
    <rect x="130" y="126" width="20" height="2" fill="#e8d4a8"/>
    <rect x="128" y="128" width="22" height="2" fill="#e8d4a8"/>
    <rect x="125" y="138" width="35" height="3" fill="#8b5a2b"/>
    <rect x="127" y="141" width="31" height="3" fill="#5c3a1f"/>
    <rect x="130" y="144" width="25" height="2" fill="#3a2410"/>
  </g></g>

  <!-- ============ TEKS ROTATOR DENGAN SLIDE ANIMATION ============ -->
  <!-- Total cycle: 6s. Tiap teks tampil 2.5s + transisi 0.5s -->
  <g clip-path="url(#textArea)" font-family="'Courier New', 'Lucida Console', monospace" font-weight="bold">

    <!-- TEKS 1: DANANG WIJAYANTO -->
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 0 0; 0 -60; 0 -60; 0 60; 0 60; 0 0"
                        keyTimes="0; 0.42; 0.5; 0.92; 0.92; 1; 1"
                        dur="6s" repeatCount="indefinite"/>
      <text x="403" y="85" text-anchor="middle" font-size="38" fill="#e63946" opacity="0.8">DANANG WIJAYANTO</text>
      <text x="397" y="85" text-anchor="middle" font-size="38" fill="#4ad8ff" opacity="0.7">DANANG WIJAYANTO</text>
      <text x="400" y="85" text-anchor="middle" font-size="38" fill="#ffffff">DANANG WIJAYANTO</text>
    </g>

    <!-- TEKS 2: SOFTWARE ENGINEER -->
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 60; 0 60; 0 0; 0 0; 0 -60; 0 -60; 0 60"
                        keyTimes="0; 0.42; 0.5; 0.92; 1; 1; 1"
                        dur="6s" repeatCount="indefinite"/>
      <text x="403" y="85" text-anchor="middle" font-size="38" fill="#e63946" opacity="0.8">SOFTWARE ENGINEER</text>
      <text x="397" y="85" text-anchor="middle" font-size="38" fill="#4ad8ff" opacity="0.7">SOFTWARE ENGINEER</text>
      <text x="400" y="85" text-anchor="middle" font-size="38" fill="#ffffff">SOFTWARE ENGINEER</text>
    </g>
  </g>

  <!-- BORDER -->
  <g><rect x="0" y="0" width="800" height="3" fill="#e63946"/><rect x="0" y="3" width="800" height="1" fill="#ffe9a8"/>
    <rect x="0" y="0" width="6" height="6" fill="#ffe9a8"/><rect x="794" y="0" width="6" height="6" fill="#ffe9a8"/>
    <rect x="6" y="6" width="3" height="3" fill="#e63946"/><rect x="791" y="6" width="3" height="3" fill="#e63946"/></g>
  <g><rect x="0" y="197" width="800" height="3" fill="#e63946"/><rect x="0" y="196" width="800" height="1" fill="#ffe9a8"/>
    <rect x="0" y="194" width="6" height="6" fill="#ffe9a8"/><rect x="794" y="194" width="6" height="6" fill="#ffe9a8"/>
    <rect x="6" y="191" width="3" height="3" fill="#e63946"/><rect x="791" y="191" width="3" height="3" fill="#e63946"/></g>
</svg>
